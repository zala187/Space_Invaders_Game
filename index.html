<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Space Invaders</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="hud">
  <span>Score: <b id="sc">0</b></span>
  <span>Best: <b id="bs">0</b></span>
  <span>Level: <b id="lv">1</b></span>
  <span>Lives: <b id="li">♥♥♥</b></span>
</div>

<canvas id="gameCanvas"></canvas>

<div id="controls">
  <div class="ctrl-btn" id="btn-left">◀</div>
  <div class="ctrl-btn" id="btn-fire">FIRE</div>
  <div class="ctrl-btn" id="btn-right">▶</div>
</div>

<script src="script.js"></script>
</body>
</html>
